<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabre de Luz</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: #f0f0f0;
      height: 500vh;
      font-family: sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      outline: none;
      z-index: -1;
    }

    .nav-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 15px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #333;
      text-decoration: none;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      z-index: 1000;
      transition: 0.3s;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }

    .seletor-cores {
      position: fixed;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 100;
      padding: 15px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .botao-cor {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .botao-cor:hover {
      transform: scale(1.2);
    }

    #verde {
      background: #00ff00;
    }

    #azul {
      background: #0000ff;
    }

    #vermelho {
      background: #ff0000;
    }

    .conteudo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <a href="viewer.html" class="nav-btn">Viewer</a>
  <div class="seletor-cores">
    <div class="botao-cor" id="verde"></div>
    <div class="botao-cor" id="azul"></div>
    <div class="botao-cor" id="vermelho"></div>
  </div>
  <div class="conteudo"></div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>

</html>
